# Ruff configuration

# Enable pycodestyle, pyflakes, and isort
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM"]

# Ignore specific rules
ignore = [
    "E501",  # Line too long (handled by formatter)
    "B008",  # Do not perform function call in argument defaults
    "N805",  # First argument should be self
]

# Exclude directories
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "alembic/versions",
    "build",
    "dist",
]

# Line length
line-length = 100

# Python version
target-version = "py312"

# Format settings
[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

# Isort settings
[isort]
known-first-party = ["app"]
